<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elijah Chudnoff</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf9f6; --text: #1a1814; --accent: #7b2d35;
            --muted: #706b65; --light: #9a9590; --rule: #ddd9d3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'EB Garamond', Georgia, serif; background: var(--bg); color: var(--text); font-size: 19px; line-height: 1.75; min-height: 100vh; display: flex; flex-direction: column; }
        nav { border-bottom: 1px solid var(--rule); padding: 1.25rem 3.5rem; display: flex; justify-content: space-between; align-items: baseline; }
        .nav-name { font-family: 'Josefin Sans', sans-serif; font-weight: 200; font-size: 0.78rem; letter-spacing: 0.25em; text-transform: uppercase; text-decoration: none; color: var(--text); }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a { font-family: 'Josefin Sans', sans-serif; font-weight: 300; font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; text-decoration: none; color: var(--muted); transition: color 0.15s; }
        .nav-links a:hover { color: var(--text); }
        .nav-links a.active { color: var(--accent); }
        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 4rem 2rem; }
        .home-card { display: grid; grid-template-columns: 200px 1fr; gap: 3.5rem; align-items: center; max-width: 700px; width: 100%; }
        .photo-placeholder { width: 200px; height: 240px; background: var(--rule); display: flex; align-items: center; justify-content: center; }
        .photo-placeholder img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .photo-note { font-family: 'Josefin Sans', sans-serif; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--light); text-align: center; text-transform: uppercase; padding: 0 1rem; }
        .home-info h1 { font-size: 2.2rem; font-weight: 400; font-style: italic; letter-spacing: -0.01em; margin-bottom: 0.5rem; }
        .home-info .title { font-size: 1rem; color: var(--muted); }
        .home-info .institution { font-size: 1rem; color: var(--muted); }
        .home-info .email { margin-top: 0.8rem; font-size: 0.9rem; }
        .home-info .email a { color: var(--accent); text-decoration: none; }
        .home-info .email a:hover { text-decoration: underline; }
        .home-divider { width: 2rem; height: 1px; background: var(--rule); margin: 1rem 0; }
        @media (max-width: 640px) { nav { flex-direction: column; gap: 1rem; padding: 1.1rem 1.5rem; } .nav-links { gap: 1.4rem; flex-wrap: wrap; } .home-card { grid-template-columns: 1fr; text-align: center; } .photo-placeholder { margin: 0 auto; } .home-divider { margin: 1rem auto; } }
    </style>
</head>
<body>
<nav>
    <a class="nav-name" href="index.html">Elijah Chudnoff</a>
    <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="cv.html">CV</a></li>
        <li><a href="research.html">Research</a></li>
        <li><a href="writing-guide.html">Writing Guide</a></li>
    </ul>
</nav>
<main>
    <div class="home-card">
        <div class="photo-placeholder">
            <!-- Replace the line below with: <img src="photo.jpg" alt="Elijah Chudnoff"> -->
            <span class="photo-note">Add photo.jpg to this folder</span>
        </div>
        <div class="home-info">
            <h1>Elijah Chudnoff</h1>
            <div class="home-divider"></div>
            <p class="title">Professor of Philosophy</p>
            <p class="institution">University of Miami</p>
            <p class="email"><a href="mailto:e.chudnoff@miami.edu">e.chudnoff@miami.edu</a></p>
        </div>
    </div>
</main>
</body>
</html>
