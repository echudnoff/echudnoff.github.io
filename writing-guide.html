    <style>
        :root { --bg:#faf9f6; --text:#1a1814; --accent:#7b2d35; --muted:#706b65; --light:#9a9590; --rule:#ddd9d3; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'EB Garamond',Georgia,serif; background:var(--bg); color:var(--text); font-size:19px; line-height:1.75; }
        nav { border-bottom:1px solid var(--rule); padding:1.25rem 3.5rem; display:flex; justify-content:space-between; align-items:baseline; }

        .nav-links { display:flex; gap:2.5rem; list-style:none; }
        .nav-links a { font-family:'Josefin Sans',sans-serif; font-weight:300; font-size:0.72rem; letter-spacing:0.18em; text-transform:uppercase; text-decoration:none; color:var(--muted); transition:color .15s; }
        .nav-links a:hover { color:var(--text); }
        .nav-links a.active { color:var(--accent); }
        main { max-width:760px; margin:0 auto; padding:4.5rem 2rem 7rem; }
        h1 { font-size:2.4rem; font-weight:400; font-style:italic; letter-spacing:-0.015em; margin-bottom:2rem; }
        .placeholder-note { font-size:1rem; color:var(--muted); border-top:1px solid var(--rule); padding-top:1.5rem; }
        .placeholder-note a { color:var(--accent); text-decoration:none; }
        .placeholder-note a:hover { text-decoration:underline; }
        @media (max-width:640px) { nav { flex-direction:column; gap:1rem; padding:1.1rem 1.5rem; } .nav-links { gap:1.4rem; flex-wrap:wrap; } main { padding:2.5rem 1.4rem 5rem; } }
